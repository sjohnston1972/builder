name = "builder"
main = "src/index.ts"
compatibility_date = "2025-04-17"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "builder.clydeford.net", custom_domain = true }
]

[vars]
CF_ACCOUNT_ID = "5bdc4d7840e522355b86631e6b8fac2b"
ZONE_ID = "68c212a7f233ee505d871e816da19600"
SITE_ZONE = "clydeford.net"

[[durable_objects.bindings]]
name = "SITE_SESSION"
class_name = "SiteSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SiteSession"]

[[kv_namespaces]]
binding = "SITES"
id = "ab925a8b196a4be2bdbd2a8ea7bac00d"

[[containers]]
name = "builder-buildbox"
class_name = "BuildBox"
image = "./container/Dockerfile"
max_instances = 5
# "lite" (256 MiB / 1/16 vCPU) OOM-kills real npm installs (react-markdown's tree
# peaks well past 256 MiB) and is too slow (1/16 vCPU). "standard" = 4 GiB / 1/2 vCPU.
instance_type = "standard"

[[durable_objects.bindings]]
name = "BUILD_BOX"
class_name = "BuildBox"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["BuildBox"]

[[durable_objects.bindings]]
name = "LOG_STORE"
class_name = "LogStore"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["LogStore"]
